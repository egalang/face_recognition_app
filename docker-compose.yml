services:
  student-face-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: student-face-api
    restart: no
    ports:
      - "8001:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
